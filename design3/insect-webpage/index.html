<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Insect UI</title>

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="var.css">
</head>
<body>
  <header class="navbar">
    <div class="logo">INSECT</div>

    <div class="search-box">
      <input type="text" placeholder="Search...">
    </div>

    <nav class="nav-links">
      <a href="#">Home</a>
      <a href="#">Shop</a>
      <a href="#">About</a>
      <a href="#">Gallery</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="main">

    
    <div class="left">
      <div class="vertical-text">Classification</div>

      <ul class="list">
        <li><span>Class:</span> Insecta</li>
        <li><span>Order:</span> Coleoptera</li>
        <li><span>Family:</span> Cerambycidae</li>
        <li><span>Sub-Family:</span> Cerambycinae</li>
        <li><span>Tribe:</span> Callichromatini</li>
        <li><span>Genus:</span> Pachyteria</li>
      </ul>
    </div>

  
    <div class="right">
      <div class="right-content">
        <h1>Pachyteria<br>equestris</h1>

        <div class="specs">
          <div> Malaysia</div>
          <div>Male</div>
          <div> 32 mm / 12 mm</div>
        </div>

        <div class="price">$5.99</div>

        <div class="options">
          <label><input type="checkbox"> View detailed antennae</label>
          <label><input type="checkbox"> View underside</label>
        </div>

        <button>Add to collection</button>
      </div>
    </div>

    <div class="center">
      <img src="images/insect.png" alt="insect" class="insect-img">
    </div>

  </section>

</body>
</html>
